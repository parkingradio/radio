<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Bar</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent; }

/* ── Barre fixe ── */
.radio-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 54px;
  background: #111;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 18px;
  z-index: 99999;
  border-bottom: 1px solid #222;
}

.live-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #444; flex-shrink: 0;
}
.live-dot.on { background: #e74c3c; animation: pulse 1.8s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

.play-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: #fff; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .15s, transform .1s;
}
.play-btn:hover { background: #ddd; transform: scale(1.07); }
.play-btn:active { transform: scale(.94); }

.track-info { flex: 1; min-width: 0; }
.track-name { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.station-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

.vol-wrap { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.vol-wrap svg { color: #555; }
input[type=range] {
  -webkit-appearance: none; width: 72px; height: 3px;
  background: #383838; border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer;
}
input[type=range]::-moz-range-thumb { width:12px; height:12px; border-radius:50%; background:#fff; border:none; }

.bars { display: flex; align-items: flex-end; gap: 2px; height: 20px; flex-shrink: 0; }
.bar { width: 3px; background: #2a2a2a; border-radius: 1px; transition: height .09s; }
.bar.on { background: #fff; }

/* Le vrai widget Caster est caché mais actif */
#caster-host {
  position: fixed;
  bottom: -200px;
  left: -9999px;
  width: 300px;
  height: 100px;
  overflow: hidden;
  pointer-events: none;
  visibility: hidden;
}
</style>
</head>
<body>

<!-- Notre barre custom -->
<div class="radio-bar">
  <div class="live-dot" id="dot"></div>

  <button class="play-btn" id="playBtn" aria-label="Lire / Pause">
    <svg id="icPlay" width="13" height="15" viewBox="0 0 13 15" fill="none">
      <path d="M1.5 1.5L12 7.5L1.5 13.5V1.5Z" fill="#111" stroke="#111" stroke-width=".5"/>
    </svg>
    <svg id="icPause" width="13" height="15" viewBox="0 0 13 15" fill="none" style="display:none">
      <rect x="1" y="1" width="4" height="13" rx="1" fill="#111"/>
      <rect x="8" y="1" width="4" height="13" rx="1" fill="#111"/>
    </svg>
  </button>

  <div class="track-info">
    <div class="track-name" id="trackName">Cliquez ▶ pour écouter</div>
    <div class="station-label" id="stationLbl">Radio</div>
  </div>

  <div class="vol-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>
    <input type="range" id="vol" min="0" max="100" value="80" aria-label="Volume">
  </div>

  <div class="bars">
    <div class="bar" style="height:4px"></div>
    <div class="bar" style="height:9px"></div>
    <div class="bar" style="height:14px"></div>
    <div class="bar" style="height:7px"></div>
    <div class="bar" style="height:18px"></div>
    <div class="bar" style="height:10px"></div>
    <div class="bar" style="height:5px"></div>
  </div>
</div>

<!-- Widget Caster.fm officiel caché — il gère le flux lui-même -->
<div id="caster-host">
  <div
    data-type="newStreamPlayer"
    data-publicToken="b227e44d-5d42-4824-ac48-2279197e83f3"
    data-theme="dark"
    data-color="000000"
    data-channelId="a20a4c0a-7a0f-4047-8e28-33fefe49e9f1"
    data-rendered="false"
    class="cstrEmbed">
    <a href="https://www.caster.fm">Shoutcast Hosting</a>
    <a href="https://www.caster.fm">Stream Hosting</a>
    <a href="https://www.caster.fm">Radio Server Hosting</a>
  </div>
</div>

<script>
(function(){
  var TOKEN   = 'b227e44d-5d42-4824-ac48-2279197e83f3';
  var CHANNEL = 'a20a4c0a-7a0f-4047-8e28-33fefe49e9f1';

  var playBtn  = document.getElementById('playBtn');
  var icPlay   = document.getElementById('icPlay');
  var icPause  = document.getElementById('icPause');
  var trackEl  = document.getElementById('trackName');
  var stationEl= document.getElementById('stationLbl');
  var volEl    = document.getElementById('vol');
  var dot      = document.getElementById('dot');
  var bars     = document.querySelectorAll('.bar');

  var playing  = false;
  var vizTimer = null;
  var metaTimer= null;

  /* ── Visualizer ── */
  function startViz(){
    bars.forEach(function(b){b.classList.add('on');});
    vizTimer = setInterval(function(){
      bars.forEach(function(b){ b.style.height=(Math.random()*16+3)+'px'; });
    }, 100);
  }
  function stopViz(){
    clearInterval(vizTimer); vizTimer=null;
    var d=[4,9,14,7,18,10,5];
    bars.forEach(function(b,i){ b.classList.remove('on'); b.style.height=d[i]+'px'; });
  }

  /* ── UI state ── */
  function setUI(state){
    playing = state;
    icPlay.style.display  = state ? 'none'  : 'block';
    icPause.style.display = state ? 'block' : 'none';
    dot.className = 'live-dot' + (state ? ' on' : '');
    if(state){ startViz(); fetchMeta(); metaTimer=setInterval(fetchMeta,10000); }
    else { stopViz(); clearInterval(metaTimer); }
  }

  /* ── Now playing via Icecast status (intercepté depuis le widget) ── */
  var casterAudio = null; // référence à l'élément audio créé par embed.js

  function findCasterAudio(){
    // embed.js crée un <audio> ou <video> dans le DOM — on le cherche
    var els = document.querySelectorAll('audio, video');
    for(var i=0; i<els.length; i++){
      if(els[i].src && els[i].src.indexOf('caster') !== -1){
        return els[i];
      }
    }
    // Parfois l'iframe du widget contient l'audio — on cherche le plus récent
    if(els.length > 0) return els[els.length-1];
    return null;
  }

  function fetchMeta(){
    // Essayer les deux endpoints publics connus
    var urls = [
      'https://hub.api.caster.fm/public/nowplaying/'+CHANNEL+'?token='+TOKEN+'&_='+Date.now(),
      'https://api.caster.fm/channels/'+CHANNEL+'/nowplaying?token='+TOKEN+'&_='+Date.now()
    ];
    function tryNext(i){
      if(i >= urls.length) return;
      fetch(urls[i]).then(function(r){ return r.json(); }).then(function(d){
        var title = d.title || d.now_playing || d.current_song || '';
        if(title){ trackEl.textContent = title; }
        if(d.station_name || d.name){ stationEl.textContent = d.station_name || d.name; }
      }).catch(function(){ tryNext(i+1); });
    }
    tryNext(0);
  }

  /* ── Contrôle via le widget Caster ou audio direct ── */
  var casterReady = false;
  var pendingPlay = false;

  function tryClickCasterPlay(){
    // Le widget embed.js génère un bouton play dans le DOM
    var btns = document.querySelectorAll('.cstrEmbed button, [class*="cstr"] button, [class*="caster"] button');
    if(btns.length > 0){
      btns[0].click();
      return true;
    }
    // Cherche dans les iframes créées par embed.js
    var iframes = document.querySelectorAll('iframe');
    for(var i=0; i<iframes.length; i++){
      try {
        var btn = iframes[i].contentDocument && iframes[i].contentDocument.querySelector('button');
        if(btn){ btn.click(); return true; }
      } catch(e){}
      // postMessage générique
      iframes[i].contentWindow && iframes[i].contentWindow.postMessage({action:'play'}, '*');
    }
    return false;
  }

  function tryControlAudio(action){
    var el = findCasterAudio();
    if(el){
      casterAudio = el;
      if(action === 'play'){
        el.volume = volEl.value/100;
        var p = el.play();
        if(p && p.catch){ p.catch(function(e){ console.warn(e); }); }
      } else {
        el.pause();
      }
      return true;
    }
    return false;
  }

  /* ── Bouton play principal ── */
  playBtn.addEventListener('click', function(){
    if(!playing){
      setUI(true);
      trackEl.textContent = 'Connexion…';

      // 1. Essayer de contrôler l'audio Caster directement
      if(!tryControlAudio('play')){
        // 2. Essayer de cliquer sur le bouton du widget
        tryClickCasterPlay();
        // 3. Attendre que embed.js crée l'audio et le contrôler
        var attempts = 0;
        var poll = setInterval(function(){
          attempts++;
          if(tryControlAudio('play')){
            clearInterval(poll);
          } else if(attempts > 40){ // 4 secondes
            clearInterval(poll);
            trackEl.textContent = 'Voir note ci-dessous ↓';
          }
        }, 100);
      }
    } else {
      setUI(false);
      if(casterAudio){ casterAudio.pause(); }
      else { tryControlAudio('pause'); }
      trackEl.textContent = 'Cliquez ▶ pour écouter';
    }
  });

  /* Surveiller l'audio Caster une fois créé */
  var observer = new MutationObserver(function(){
    var el = findCasterAudio();
    if(el && !casterAudio){
      casterAudio = el;
      casterAudio.addEventListener('playing', function(){
        if(playing){ trackEl.textContent = 'En écoute…'; fetchMeta(); }
      });
      casterAudio.addEventListener('pause', function(){
        if(playing){ setUI(false); trackEl.textContent = 'Cliquez ▶ pour écouter'; }
      });
      if(pendingPlay){ casterAudio.volume=volEl.value/100; casterAudio.play(); pendingPlay=false; }
    }
  });
  observer.observe(document.body, {childList:true, subtree:true});

  volEl.addEventListener('input', function(){
    var v = this.value/100;
    if(casterAudio) casterAudio.volume = v;
    else { var el=findCasterAudio(); if(el) el.volume=v; }
  });

  /* Charger le script Caster officiel */
  var script = document.createElement('script');
  script.src = 'https://cdn.cloud.caster.fm/widgets/embed.js';
  script.onload = function(){ casterReady=true; };
  document.body.appendChild(script);

  /* Métadonnées initiales */
  setTimeout(fetchMeta, 1500);

})();
</script>
</body>
</html>
