<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Bar</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent; }

.radio-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 54px;
  background: #111;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 18px;
  z-index: 99999;
  border-bottom: 1px solid #222;
}

.live-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #444; flex-shrink: 0;
}
.live-dot.on { background: #e74c3c; animation: pulse 1.8s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

.play-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: #fff; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .15s, transform .1s;
  position: relative; z-index: 2;
}
.play-btn:hover { background: #ddd; transform: scale(1.07); }
.play-btn:active { transform: scale(.94); }

.track-info { flex: 1; min-width: 0; }
.track-name { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.station-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

.vol-wrap { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.vol-wrap svg { color: #555; }
input[type=range] {
  -webkit-appearance: none; width: 72px; height: 3px;
  background: #383838; border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer;
}
input[type=range]::-moz-range-thumb { width:12px; height:12px; border-radius:50%; background:#fff; border:none; }

.bars { display: flex; align-items: flex-end; gap: 2px; height: 20px; flex-shrink: 0; }
.bar { width: 3px; background: #2a2a2a; border-radius: 1px; transition: height .09s; }
.bar.on { background: #fff; }

/* L'iframe Caster est VISIBLE mais minuscule et couverte par notre barre */
/* Elle doit être dans le flux DOM pour que le navigateur autorise l'audio */
#caster-wrap {
  position: fixed;
  top: 0; left: 0;
  width: 1px; height: 54px;
  overflow: hidden;
  z-index: 99998; /* juste dessous notre barre */
  opacity: 0;
  pointer-events: none;
}
#caster-iframe {
  width: 300px;
  height: 54px;
  border: none;
}
</style>
</head>
<body>

<!-- Barre custom -->
<div class="radio-bar">
  <div class="live-dot" id="dot"></div>

  <button class="play-btn" id="playBtn" aria-label="Lire / Pause">
    <svg id="icPlay" width="13" height="15" viewBox="0 0 13 15" fill="none">
      <path d="M1.5 1.5L12 7.5L1.5 13.5V1.5Z" fill="#111" stroke="#111" stroke-width=".5"/>
    </svg>
    <svg id="icPause" width="13" height="15" viewBox="0 0 13 15" fill="none" style="display:none">
      <rect x="1" y="1" width="4" height="13" rx="1" fill="#111"/>
      <rect x="8" y="1" width="4" height="13" rx="1" fill="#111"/>
    </svg>
  </button>

  <div class="track-info">
    <div class="track-name" id="trackName">Cliquez ▶ pour écouter</div>
    <div class="station-label" id="stationLbl">Radio</div>
  </div>

  <div class="vol-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>
    <input type="range" id="vol" min="0" max="100" value="80" aria-label="Volume">
  </div>

  <div class="bars">
    <div class="bar" style="height:4px"></div>
    <div class="bar" style="height:9px"></div>
    <div class="bar" style="height:14px"></div>
    <div class="bar" style="height:7px"></div>
    <div class="bar" style="height:18px"></div>
    <div class="bar" style="height:10px"></div>
    <div class="bar" style="height:5px"></div>
  </div>
</div>

<!-- iframe Caster officielle — invisible mais active pour l'audio -->
<div id="caster-wrap">
  <iframe
    id="caster-iframe"
    src=""
    allow="autoplay"
    allowtransparency="true"
    scrolling="no">
  </iframe>
</div>

<script>
(function(){
  var TOKEN   = 'b227e44d-5d42-4824-ac48-2279197e83f3';
  var CHANNEL = 'a20a4c0a-7a0f-4047-8e28-33fefe49e9f1';

  // URL du player officiel Caster.fm (celle trouvée dans les résultats de recherche)
  var PLAYER_URL = 'https://hub.api.caster.fm/public/widgets/player/'
    + '?token=' + TOKEN
    + '&channelId=' + CHANNEL
    + '&theme=dark&color=000000&autoplay=0';

  var iframe   = document.getElementById('caster-iframe');
  var playBtn  = document.getElementById('playBtn');
  var icPlay   = document.getElementById('icPlay');
  var icPause  = document.getElementById('icPause');
  var trackEl  = document.getElementById('trackName');
  var stationEl= document.getElementById('stationLbl');
  var volEl    = document.getElementById('vol');
  var dot      = document.getElementById('dot');
  var bars     = document.querySelectorAll('.bar');

  var playing  = false;
  var iframeLoaded = false;
  var vizTimer = null;
  var metaTimer= null;

  /* ── Visualizer ── */
  function startViz(){
    bars.forEach(function(b){ b.classList.add('on'); });
    vizTimer = setInterval(function(){
      bars.forEach(function(b){ b.style.height=(Math.random()*16+3)+'px'; });
    }, 100);
  }
  function stopViz(){
    clearInterval(vizTimer); vizTimer=null;
    var d=[4,9,14,7,18,10,5];
    bars.forEach(function(b,i){ b.classList.remove('on'); b.style.height=d[i]+'px'; });
  }

  /* ── UI state ── */
  function setUI(state){
    playing = state;
    icPlay.style.display  = state ? 'none'  : 'block';
    icPause.style.display = state ? 'block' : 'none';
    dot.className = 'live-dot' + (state ? ' on' : '');
    if(state){ startViz(); fetchMeta(); metaTimer=setInterval(fetchMeta,10000); }
    else { stopViz(); clearInterval(metaTimer); }
  }

  /* ── Métadonnées ── */
  function fetchMeta(){
    fetch('https://hub.api.caster.fm/public/nowplaying/'+CHANNEL+'?token='+TOKEN+'&_='+Date.now())
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(d.title || d.now_playing){
          trackEl.textContent = d.title || d.now_playing;
        }
        if(d.station_name || d.name){
          stationEl.textContent = d.station_name || d.name;
        }
      }).catch(function(){
        // Fallback endpoint
        fetch('https://api.caster.fm/channels/'+CHANNEL+'/nowplaying?token='+TOKEN+'&_='+Date.now())
          .then(function(r){ return r.json(); })
          .then(function(d){
            if(d.title) trackEl.textContent = d.title;
            if(d.station_name) stationEl.textContent = d.station_name;
          }).catch(function(){});
      });
  }

  /* ── Envoyer commandes à l'iframe via postMessage ── */
  function sendToIframe(msg){
    try {
      iframe.contentWindow.postMessage(msg, '*');
    } catch(e){}
  }

  /* ── Charger l'iframe au premier clic (autoplay policy) ── */
  function loadIframe(callback){
    if(iframeLoaded){ callback(); return; }
    iframe.src = PLAYER_URL;
    iframe.onload = function(){
      iframeLoaded = true;
      // Laisser le player s'initialiser
      setTimeout(callback, 1500);
    };
    // Fallback si onload ne se déclenche pas
    setTimeout(function(){
      if(!iframeLoaded){ iframeLoaded=true; callback(); }
    }, 4000);
  }

  /* ── Trouver et contrôler l'audio de l'iframe ── */
  function controlIframeAudio(action){
    // Essayer postMessage avec différents formats que Caster pourrait écouter
    var msgs = [
      {action: action},
      {type: action},
      {command: action},
      {func: action === 'play' ? 'playStream' : 'pauseStream'},
      action  // string simple
    ];
    msgs.forEach(function(m){ sendToIframe(m); });

    // Essayer d'accéder directement à l'audio dans l'iframe (same-origin si GitHub Pages)
    try {
      var doc = iframe.contentDocument || iframe.contentWindow.document;
      var audios = doc.querySelectorAll('audio, video');
      audios.forEach(function(a){
        if(action === 'play'){
          a.volume = volEl.value/100;
          a.play().catch(function(){});
        } else {
          a.pause();
        }
      });
      // Cliquer sur le bouton play du widget
      if(action === 'play'){
        var btns = doc.querySelectorAll('button[class*="play"], button[aria-label*="play"], button[aria-label*="Play"], .play-btn, [class*="play"]');
        if(btns.length) btns[0].click();
      }
    } catch(e){
      // Cross-origin : postMessage seulement
    }
  }

  /* ── Volume ── */
  volEl.addEventListener('input', function(){
    var v = this.value/100;
    try {
      var doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.querySelectorAll('audio,video').forEach(function(a){ a.volume=v; });
    } catch(e){
      sendToIframe({action:'volume', value: this.value});
    }
  });

  /* ── Bouton play/pause ── */
  playBtn.addEventListener('click', function(){
    if(!playing){
      setUI(true);
      trackEl.textContent = 'Connexion…';
      loadIframe(function(){
        controlIframeAudio('play');
        setTimeout(function(){
          if(trackEl.textContent === 'Connexion…') trackEl.textContent = 'En écoute…';
        }, 2000);
      });
    } else {
      controlIframeAudio('pause');
      setUI(false);
      trackEl.textContent = 'Cliquez ▶ pour écouter';
    }
  });

  /* Écouter les messages de l'iframe */
  window.addEventListener('message', function(e){
    var d = e.data;
    if(!d) return;
    if(d.type === 'playing' || d.status === 'playing' || d.action === 'playing'){
      if(!playing) setUI(true);
    }
    if(d.title || d.now_playing){ trackEl.textContent = d.title || d.now_playing; }
    if(d.station_name){ stationEl.textContent = d.station_name; }
  });

  /* Init métadonnées */
  setTimeout(fetchMeta, 500);

})();
</script>
</body>
</html>
